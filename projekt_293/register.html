<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrierung</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="index.html"><img src="images/logo.png" alt="Aliennation" /></a>
    <input type="checkbox" id="burger-toggle" />
    <label for="burger-toggle" class="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </label>
    <ul>
      <li><a href="index.html">Intro</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="overview.html">Theorien</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="form-page">
      <div class="form-box wide">
        <h2>Registrierung</h2>
        <p class="sub">Werden Sie Mitglied</p>
        <form action="register-success.html" method="get">
          <div class="form-row">
            <label>Geschlecht</label>
            <div class="radio-group">
              <label><input type="radio" name="geschlecht" value="m" required /> Männlich</label>
              <label><input type="radio" name="geschlecht" value="f" /> Weiblich</label>
              <label><input type="radio" name="geschlecht" value="d" /> Divers</label>
            </div>
          </div>
          <div class="form-row half">
            <div class="form-row">
              <label for="vorname">Vorname</label>
              <input type="text" id="vorname" name="vorname" required />
            </div>
            <div class="form-row">
              <label for="nachname">Nachname</label>
              <input type="text" id="nachname" name="nachname" required />
            </div>
          </div>
          <div class="form-row">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-row">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div class="form-row">
            <label for="adresse">Adresse</label>
            <input type="text" id="adresse" name="adresse" required />
          </div>
          <div class="form-row half">
            <div class="form-row">
              <label for="plz">PLZ</label>
              <input type="text" id="plz" name="plz" required />
            </div>
            <div class="form-row">
              <label for="ort">Ort</label>
              <input type="text" id="ort" name="ort" required />
            </div>
          </div>
          <div class="form-row">
            <label for="land">Land</label>
            <select id="land" name="land" required>
              <option value="" disabled selected>Land wählen...</option>
              <option value="ch">Schweiz</option>
              <option value="de">Deutschland</option>
              <option value="at">Österreich</option>
              <option value="us">USA</option>
              <option value="other">Anderes</option>
            </select>
          </div>
          <div class="form-row">
            <label for="interessen">Interessen</label>
            <input type="text" id="interessen" name="interessen" required />
          </div>
          <hr />
          <div class="form-row full">
            <div class="check-group">
              <label>
                <input type="checkbox" name="datenschutz" required />
                Ich akzeptiere die Datenschutzbestimmungen
              </label>
            </div>
          </div>
          <button type="submit" class="button full">Konto erstellen</button>
          <div class="form-footer">
            <a href="login.html">Bereits ein Konto? Einloggen</a>
          </div>
        </form>
      </div>
    </div>
    <footer>
      <a href="index.html"><img src="images/logo.png" alt="Aliennation" /></a>
      <p>Aliennation</p>
    </footer>
  </div>
</body>
</html>
